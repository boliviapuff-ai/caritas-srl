<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26;
    --border: #2a2a38; --accent: #7c6af7; --accent2: #f7c46a;
    --danger: #f76a6a; --success: #6af7b0; --text: #e8e8f0;
    --muted: #7070a0; --font: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

  #loginScreen {
    display:flex; align-items:center; justify-content:center; min-height:100vh;
    background-image: radial-gradient(ellipse at 20% 50%, #7c6af720 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, #f7c46a15 0%, transparent 50%);
  }
  .login-box {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:48px 40px; width:380px; box-shadow:0 40px 80px #00000060;
  }
  .login-box h1 { font-size:28px; font-weight:800; margin-bottom:4px; }
  .login-box p { color:var(--muted); font-size:13px; margin-bottom:32px; }
  .login-box .logo-icon { font-size:32px; margin-bottom:12px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:11px; font-family:var(--mono); color:var(--muted); letter-spacing:1px; margin-bottom:6px; }
  .field input, .field select {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); padding:12px 14px; border-radius:8px;
    font-family:var(--font); font-size:14px; outline:none; transition:border-color .2s;
  }
  .field input:focus, .field select:focus { border-color:var(--accent); }
  .field select option { background:var(--surface2); }
  .hidden { display:none !important; }
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:12px 20px; border-radius:8px; border:none; cursor:pointer;
    font-family:var(--font); font-weight:700; font-size:14px; transition:opacity .2s, transform .1s;
  }
  .btn:hover { opacity:0.88; }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:var(--accent); color:#fff; width:100%; margin-top:8px; }
  .btn-sm { padding:7px 14px; font-size:12px; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-success { background:var(--success); color:#000; }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
  .error-msg { color:var(--danger); font-size:12px; margin-top:8px; font-family:var(--mono); }
  .login-quote { text-align:center; margin-top:24px; font-size:12px; color:var(--muted); font-style:italic; line-height:1.6; }

  #app { display:none; flex-direction:column; min-height:100vh; }
  .topbar {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .logo { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
  .logo span { color:var(--accent); }
  .user-badge { background:var(--surface2); border:1px solid var(--border); padding:4px 12px; border-radius:20px; font-size:12px; font-family:var(--mono); }
  .role-tag { padding:2px 8px; border-radius:4px; font-size:11px; font-family:var(--mono); font-weight:700; }
  .role-admin { background:#7c6af730; color:var(--accent); }
  .role-employee { background:#6af7b020; color:var(--success); }
  .role-external { background:#f7c46a20; color:var(--accent2); }
  .role-viewer { background:#7070a020; color:var(--muted); }

  .tabs { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; display:flex; gap:4px; overflow-x:auto; }
  .tab {
    padding:16px 18px; font-size:13px; font-weight:700; border:none; background:transparent;
    color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;
    transition:color .2s, border-color .2s;
  }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }

  .content { flex:1; padding:24px; max-width:1200px; margin:0 auto; width:100%; }
  .section { margin-bottom:24px; }
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:20px; margin-bottom:0;
  }
  .card-title { font-size:11px; font-family:var(--mono); color:var(--muted); letter-spacing:1px; margin-bottom:8px; }
  .card-value { font-size:28px; font-weight:800; font-family:var(--mono); }
  .card-value.income { color:var(--success); }
  .card-value.expense { color:var(--danger); }
  .card-value.balance { color:var(--accent2); }

  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }

  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:10px 14px; color:var(--muted); font-family:var(--mono); font-weight:400; border-bottom:1px solid var(--border); font-size:11px; }
  td { padding:10px 14px; border-bottom:1px solid #2a2a3820; }
  tr:hover td { background:var(--surface2); }
  .badge { padding:3px 8px; border-radius:4px; font-size:11px; font-family:var(--mono); }
  .badge-income { background:#6af7b020; color:var(--success); }
  .badge-expense { background:#f76a6a20; color:var(--danger); }

  .form-row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:20px; }
  .form-row .field { margin:0; flex:1; min-width:130px; }

  .sec-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .sec-title { font-size:18px; font-weight:700; }

  .fixed-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
  .fixed-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .fixed-card .fc-name { font-size:11px; font-family:var(--mono); color:var(--muted); letter-spacing:1px; margin-bottom:6px; }
  .fixed-card .fc-amount { font-size:22px; font-weight:800; color:var(--danger); margin:4px 0; }
  .fc-status { font-size:11px; padding:2px 8px; border-radius:4px; display:inline-block; font-family:var(--mono); }
  .fc-paid { background:#6af7b020; color:var(--success); }
  .fc-unpaid { background:#f76a6a20; color:var(--danger); }

  .budget-bar { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; margin-top:6px; }
  .budget-fill { height:100%; border-radius:3px; transition:width .4s; }

  .users-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .user-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .user-card .uc-name { font-size:16px; font-weight:700; margin-bottom:4px; }
  .user-card .uc-info { font-size:12px; color:var(--muted); font-family:var(--mono); }
  .user-card .uc-pass { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:6px 10px; font-family:var(--mono); font-size:13px; margin-top:8px; color:var(--accent2); }

  .week-nav { display:flex; align-items:center; gap:8px; }
  .week-nav button { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:4px 12px; border-radius:6px; cursor:pointer; font-size:18px; line-height:1; }
  .week-nav button:hover { border-color:var(--accent); }
  .week-label { font-family:var(--mono); font-size:13px; color:var(--muted); min-width:120px; text-align:center; }

  .loading { display:flex; align-items:center; gap:12px; padding:40px; color:var(--muted); font-family:var(--mono); }
  .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .alert { padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:16px; }
  .alert-info { background:#7c6af720; border:1px solid #7c6af740; color:var(--accent); }
  .alert-warn { background:#f7c46a10; border:1px solid #f7c46a30; color:var(--accent2); }

  .modal-overlay {
    display:none; position:fixed; inset:0; background:#00000080;
    align-items:center; justify-content:center; z-index:200;
  }
  .modal-overlay.open { display:flex; }
  .modal-box {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:32px; width:400px; max-width:90vw;
  }
  .modal-box h2 { font-size:18px; font-weight:800; margin-bottom:20px; }
  .modal-actions { display:flex; gap:8px; margin-top:16px; }

  @media (max-width:700px) {
    .grid-2,.grid-3,.grid-4 { grid-template-columns:1fr; }
    .content { padding:16px; }
    .login-box { width:92vw; padding:32px 24px; }
    .form-row { flex-direction:column; }
    .form-row .field { min-width:0; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-icon" style="font-size:32px;margin-bottom:12px">💼</div>
    <h1><con>Con</con><span style="color:var(--accent)">trol</span></h1>
    <p>Sistema de gestión de ingresos y gastos</p>
    <div class="field">
      <label>USUARIO</label>
      <input type="text" id="loginUser" value="admin" autocomplete="username">
    </div>
    <div class="field">
      <label>CONTRASEÑA</label>
      <input type="password" id="loginPass" autocomplete="current-password">
    </div>
    <div id="loginError" class="error-msg hidden"></div>
    <button class="btn btn-primary" id="loginBtn">Entrar</button>
    <div class="login-quote">"El éxito no es la clave de la felicidad.<br>La felicidad es la clave del éxito."</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="logo">Con<span>trol</span></div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="user-badge" id="topbarUser"></div>
      <button class="btn btn-sm btn-ghost" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="tabs" id="tabsContainer"></div>
  <div class="content">
    <div id="tabContent"></div>
  </div>
</div>

<!-- MODAL: CREAR USUARIO -->
<div class="modal-overlay" id="modalUser">
  <div class="modal-box">
    <h2>➕ Crear Usuario</h2>
    <div class="field">
      <label>NOMBRE COMPLETO</label>
      <input type="text" id="nuName" placeholder="Ej: María García">
    </div>
    <div class="field">
      <label>USUARIO (para entrar)</label>
      <input type="text" id="nuUsername" placeholder="Ej: maria">
    </div>
    <div class="field">
      <label>ROL</label>
      <select id="nuRole">
        <option value="employee">Empleado Interno</option>
        <option value="external">Personal Externo (comisión 50%)</option>
        <option value="viewer">Espectador (solo lectura)</option>
      </select>
    </div>
    <div id="nuError" class="error-msg hidden"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1" onclick="createUser()">Crear</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modalUser')">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPABASE_URL = 'https://iffutvorbnallwxvkrdg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmZnV0dm9yYm5hbGx3eHZrcmRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4Nzc3MzQsImV4cCI6MjA5MTQ1MzczNH0.9TfDI8AS3G8WsMqATawCLa879qKZrnT9wqzwTSoepf0';

async function sb(table, method='GET', body=null, query='') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : null
  });
  if (method === 'DELETE' || (method === 'PATCH' && res.status === 204)) return true;
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ============================================================
// STATE
// ============================================================
// ✅ CAMBIO: Se agregó 'Eventuales' a la lista de trabajadoras
const WORKER_NAMES = ['Hilary', 'Maricruz', 'Yhaeli', 'Mudita', 'Marisol', 'Eventuales'];
const INCOME_TYPES = ['Video Llamada', 'Contenido', 'Citas/Pieza', 'Salidas', 'Rifas', 'Grupo VIP'];
const WEEKLY_BUDGET = 1000;
let currentUser = null;
let currentWeek = getWeekKey(new Date());
let allUsers = [];
let fixedExpenses = [];

// ============================================================
// UTILS
// ============================================================
function getWeekKey(date) {
  const d = new Date(date);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function weekEnd(key) {
  const d = new Date(key + 'T12:00:00');
  d.setDate(d.getDate() + 6);
  return d.toISOString().slice(0,10);
}
function weekLabel(key) {
  const start = new Date(key + 'T12:00:00');
  const end = new Date(key + 'T12:00:00');
  end.setDate(end.getDate()+6);
  const fmt = dt => dt.toLocaleDateString('es', {day:'2-digit', month:'short'});
  return `${fmt(start)} – ${fmt(end)}`;
}
function prevWeek(key) {
  const d = new Date(key + 'T12:00:00');
  d.setDate(d.getDate()-7);
  return getWeekKey(d);
}
function nextWeek(key) {
  const d = new Date(key + 'T12:00:00');
  d.setDate(d.getDate()+7);
  return getWeekKey(d);
}
function genId() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function genPassword() {
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
  return Array.from({length:8}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}
function fmt(n) { return parseFloat(n||0).toLocaleString('es',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(str) {
  if (!str) return '';
  return new Date(str+'T12:00:00').toLocaleDateString('es',{weekday:'short',day:'2-digit',month:'short'});
}
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function roleLabel(r) { return {admin:'Admin', employee:'Empleado', external:'Externo', viewer:'Espectador'}[r] || r; }
function loading(msg='Cargando...') { return `<div class="loading"><span class="spinner"></span>${msg}</div>`; }

// ============================================================
// AUTH
// ============================================================
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value.trim();
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!u || !p) { errEl.textContent = 'Escribe tu usuario y contraseña.'; errEl.classList.remove('hidden'); return; }
  errEl.classList.add('hidden');
  btn.textContent = 'Conectando...';
  btn.disabled = true;
  try {
    const testRes = await fetch(`${SUPABASE_URL}/rest/v1/users?limit=1`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (!testRes.ok) throw new Error('No se pudo conectar a la base de datos. Código: ' + testRes.status);
    btn.textContent = 'Verificando...';
    const users = await sb('users', 'GET', null, `?username=eq.${encodeURIComponent(u)}&password=eq.${encodeURIComponent(p)}`);
    if (!users || users.length === 0) {
      errEl.textContent = 'Usuario o contraseña incorrectos.';
      errEl.classList.remove('hidden');
      btn.textContent = 'Entrar';
      btn.disabled = false;
      return;
    }
    btn.textContent = 'Cargando...';
    currentUser = users[0];
    allUsers = await sb('users');
    fixedExpenses = await sb('fixed_expenses');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderApp();
  } catch(e) {
    errEl.textContent = 'Error: ' + (e.message || 'Verifica tu conexión a internet.');
    errEl.classList.remove('hidden');
  }
  btn.textContent = 'Entrar';
  btn.disabled = false;
}

function doLogout() {
  currentUser = null; allUsers = []; fixedExpenses = [];
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

// ============================================================
// APP SHELL
// ============================================================
function renderApp() {
  const u = currentUser;
  document.getElementById('topbarUser').innerHTML = `${u.name} <span class="role-tag role-${u.role}">${roleLabel(u.role)}</span>`;
  let tabDefs = [];
  if (u.role === 'admin') {
    tabDefs = [
      {id:'dashboard', label:'📊 Resumen'},
      {id:'fixed', label:'🔒 Gastos Fijos'},
      {id:'employees', label:'👥 Empleados'},
      {id:'external', label:'⚡ Personal Externo'},
      {id:'users', label:'🔑 Usuarios'},
      {id:'cortejo', label:'🔍 Cortejo'},
    ];
  } else if (u.role === 'employee') {
    tabDefs = [
      {id:'myTransactions', label:'📋 Mis Movimientos'},
      {id:'myBudget', label:'💰 Mi Presupuesto'},
      {id:'fixedView', label:'🔒 Gastos Fijos'},
    ];
  } else if (u.role === 'external') {
    tabDefs = [
      {id:'externalSelf', label:'📋 Mi Hoja Diaria'},
      {id:'myCommission', label:'💸 Mis Comisiones'},
    ];
  } else if (u.role === 'viewer') {
    tabDefs = [
      {id:'externalViewer', label:'⚡ Personal Externo'},
    ];
  }
  document.getElementById('tabsContainer').innerHTML = tabDefs.map((t,i) =>
    `<button class="tab${i===0?' active':''}" onclick="switchTab('${t.id}',this)">${t.label}</button>`
  ).join('');
  switchTab(tabDefs[0].id);
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelector('.tab')?.classList.add('active');
  renderTab(tabId);
}

async function renderTab(tabId) {
  const content = document.getElementById('tabContent');
  content.innerHTML = loading();
  switch(tabId) {
    case 'dashboard': content.innerHTML = await renderDashboard(); break;
    case 'fixed': content.innerHTML = renderFixed(true); break;
    case 'fixedView': content.innerHTML = renderFixed(false); break;
    case 'employees': content.innerHTML = await renderEmployees(); break;
    case 'external': content.innerHTML = await renderExternal(); break;
    case 'externalViewer': content.innerHTML = await renderExternalViewer(); break;
    case 'users': content.innerHTML = renderUsers(); break;
    case 'myTransactions': content.innerHTML = await renderMyTransactions(); break;
    case 'myBudget': content.innerHTML = await renderMyBudget(); break;
    case 'externalSelf': content.innerHTML = await renderExternalSelf(); break;
    case 'myCommission': content.innerHTML = await renderMyCommission(); break;
    case 'cortejo': content.innerHTML = await renderCortejo(); break;
  }
}

// ============================================================
// DASHBOARD
// ============================================================
async function renderDashboard() {
  const wk = currentWeek;
  const txs = await sb('transactions','GET',null,`?week_key=eq.${wk}`);
  fixedExpenses = await sb('fixed_expenses');
  let totalIncome=0, totalExpense=0;
  const byType = {};
  INCOME_TYPES.forEach(t => byType[t]=0);
  txs.forEach(tx => {
    if (tx.is_income) {
      totalIncome += parseFloat(tx.amount||0);
      INCOME_TYPES.forEach(t => { if (tx.concept && tx.concept.includes(t)) byType[t] += parseFloat(tx.amount||0); });
    } else { totalExpense += parseFloat(tx.amount||0); }
  });
  const fixedTotal = fixedExpenses.reduce((s,e) => s+parseFloat(e.amount||0), 0);
  const fixedPaid = fixedExpenses.filter(e=>e.paid).reduce((s,e) => s+parseFloat(e.amount||0), 0);
  const net = totalIncome - totalExpense - fixedPaid;
  const employees = allUsers.filter(u => u.role === 'employee');
  const empStats = await Promise.all(employees.map(async u => {
    const etxs = txs.filter(t => t.user_id === u.id);
    const spent = etxs.filter(t=>!t.is_income).reduce((s,t)=>s+parseFloat(t.amount||0),0);
    return {u, spent};
  }));
  return `
  <div class="section">
    <div class="sec-header">
      <div class="sec-title">Resumen General</div>
      <div class="week-nav">
        <button onclick="dashNav(-1)">&#x2039;</button>
        <span class="week-label">${weekLabel(wk)}</span>
        <button onclick="dashNav(1)">&#x203a;</button>
      </div>
    </div>
    <div class="grid-4">
      <div class="card"><div class="card-title">INGRESOS TOTALES</div><div class="card-value income">Bs ${fmt(totalIncome)}</div></div>
      <div class="card"><div class="card-title">EGRESOS EMPLEADOS</div><div class="card-value expense">Bs ${fmt(totalExpense)}</div></div>

        <div class="field" style="flex:0 0 140px">
          <label>MONTO (Bs)</label>
          <input type="number" id="newFixedAmount" placeholder="0.00" min="0">
        </div>
        <button class="btn btn-sm btn-success" style="height:38px;white-space:nowrap" onclick="addNewFixed()">Guardar</button>
        <button class="btn btn-sm btn-ghost" style="height:38px" onclick="hideAddFixed()">Cancelar</button>
      </div>
    </div>` : ''}

    <div class="fixed-grid">
      ${fixedExpenses.map(e => `
      <div class="fixed-card" id="fcard_${e.id}">
        ${canEdit ? `
        <!-- Modo edición -->
        <div style="margin-bottom:10px">
          <label style="font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1px">NOMBRE</label>
          <input type="text" id="fn_${e.id}" value="${e.name}" 
            style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);
                   padding:7px 10px;border-radius:7px;font-family:var(--font);font-size:13px;
                   font-weight:700;outline:none;margin-top:4px;letter-spacing:0.5px"
            onfocus="this.style.borderColor='var(--accent)'"
            onblur="this.style.borderColor='var(--border)'">
        </div>
        <div style="margin-bottom:12px">
          <label style="font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1px">MONTO (Bs)</label>
          <input type="number" id="fa_${e.id}" value="${e.amount||0}" min="0"
            style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--success);
                   padding:7px 10px;border-radius:7px;font-family:var(--mono);font-size:22px;
                   font-weight:800;outline:none;margin-top:4px"
            onfocus="this.style.borderColor='var(--success)'"
            onblur="this.style.borderColor='var(--border)'">
        </div>
        <span class="fc-status ${e.paid?'fc-paid':'fc-unpaid'}" style="margin-bottom:14px;display:inline-block">
          ${e.paid?'✓ Pagado':'○ Pendiente'}
        </span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-sm btn-primary" style="flex:1" onclick="saveFixed('${e.id}')">💾 Guardar</button>
          <button class="btn btn-sm ${e.paid?'btn-ghost':'btn-success'}" onclick="toggleFixed('${e.id}')">
            ${e.paid?'↩ Desmarcar':'✓ Pagado'}
          </button>
          <button class="btn btn-sm btn-danger" onclick="deleteFixed('${e.id}')" title="Eliminar">🗑️</button>
        </div>
        ` : `
        <!-- Modo solo lectura -->
        <div class="fc-name">${e.name.toUpperCase()}</div>
        <div class="fc-amount">Bs ${fmt(e.amount)}</div>
        <span class="fc-status ${e.paid?'fc-paid':'fc-unpaid'}">${e.paid?'✓ Pagado':'○ Pendiente'}</span>

      </div>`).join('')}

}

function showAddFixed() {
  const f = document.getElementById('addFixedForm');
  if (f) f.style.display = 'block';
}
function hideAddFixed() {
  const f = document.getElementById('addFixedForm');
  if (f) f.style.display = 'none';
  const n = document.getElementById('newFixedName');
  const a = document.getElementById('newFixedAmount');
  if (n) n.value = '';
  if (a) a.value = '';
}
async function addNewFixed() {
  const name = document.getElementById('newFixedName')?.value.trim();
  const amount = parseFloat(document.getElementById('newFixedAmount')?.value)||0;
  if (!name) { alert('Escribe el nombre del gasto.'); return; }
  if (amount <= 0) { alert('Ingresa un monto válido.'); return; }
  await sb('fixed_expenses','POST',{ id: genId(), name, amount, paid: false });
  fixedExpenses = await sb('fixed_expenses');
  hideAddFixed();
  renderTab('fixed');
}
async function saveFixed(id) {
  const name = document.getElementById('fn_'+id)?.value.trim();
  const amount = parseFloat(document.getElementById('fa_'+id)?.value)||0;
  if (!name) { alert('El nombre no puede estar vacío.'); return; }
  const btn = event.target;
  btn.textContent = 'Guardando...';
  btn.disabled = true;
  await sb('fixed_expenses','PATCH',{name, amount},`?id=eq.${id}`);
  fixedExpenses = await sb('fixed_expenses');
  // Visual feedback
  btn.textContent = '✅ Guardado';
  setTimeout(() => { btn.textContent = '💾 Guardar'; btn.disabled = false; }, 1500);
}
async function toggleFixed(id) {
  const e = fixedExpenses.find(x=>x.id===id);
  if (!e) return;
  await sb('fixed_expenses','PATCH',{paid:!e.paid},`?id=eq.${id}`);
  fixedExpenses = await sb('fixed_expenses');
  renderTab('fixed');
}
async function deleteFixed(id) {
  const e = fixedExpenses.find(x=>x.id===id);
  if (!e) return;
  if (!confirm(`¿Eliminar "${e.name}"? Esta acción no se puede deshacer.`)) return;
  await sb('fixed_expenses','DELETE',null,`?id=eq.${id}`);
  fixedExpenses = await sb('fixed_expenses');
  renderTab('fixed');
}

async function addWorkerExpense(userId) {
  const date    = document.getElementById('extexp_date_'+userId)?.value || today();
  const concept = document.getElementById('extexp_concept_'+userId)?.value.trim() || '';

  if (amount <= 0) { alert('Ingresa un monto válido.'); return; }
  const btn = event.target;
  btn.textContent = 'Guardando...';
  btn.disabled = true;
  await sb('external_ledger','POST',{
    id: genId(),
    user_id: userId,
    date,
    concept,
    amount,
    is_income: false
  });
  document.getElementById('extexp_concept_'+userId).value = '';
  document.getElementById('extexp_amount_'+userId).value  = '';

  btn.disabled = false;
  renderTab('external');
}

async function createUser() {
  const name = document.getElementById('nuName').value.trim();
  const username = document.getElementById('nuUsername').value.trim().toLowerCase().replace(/\s/g,'_');
  const role = document.getElementById('nuRole').value;
  const errEl = document.getElementById('nuError');
  if (!name||!username) { errEl.textContent='Completa todos los campos.'; errEl.classList.remove('hidden'); return; }
  if (allUsers.some(u=>u.username===username)) { errEl.textContent='Ese usuario ya existe.'; errEl.classList.remove('hidden'); return; }
  const id = genId();
  const password = genPassword();
  await sb('users','POST',{id, name, username, password, role});
  allUsers = await sb('users');
  closeModal('modalUser');
  document.getElementById('nuName').value='';
  document.getElementById('nuUsername').value='';
  errEl.classList.add('hidden');
  renderTab('users');
}
async function deleteUser(id) {
  if (!confirm('¿Eliminar este usuario y todos sus datos?')) return;
  await sb('transactions','DELETE',null,`?user_id=eq.${id}`);
  await sb('external_ledger','DELETE',null,`?user_id=eq.${id}`);
  await sb('users','DELETE',null,`?id=eq.${id}`);
  allUsers = await sb('users');
  renderTab('users');
}
async function resetPass(id) {
  const p = genPassword();
  await sb('users','PATCH',{password:p},`?id=eq.${id}`);
  allUsers = await sb('users');
  renderTab('users');
}

async function addIncome() {
  const u = currentUser;
  const wk = currentWeek;
  const isAdmin = currentUser.role==='admin';
  const dateEl = document.getElementById('inDate');
  const date = (isAdmin && dateEl && dateEl.value) ? dateEl.value : today();
  const workerName = document.getElementById('inWorker')?.value || '';
  const service = document.getElementById('inService')?.value || '';
  const amount = parseFloat(document.getElementById('inAmount')?.value)||0;
  if (amount<=0) { alert('Ingresa un monto válido.'); return; }
  const concept = workerName ? `${workerName} - ${service}` : service;
  await sb('transactions','POST',{
    id: genId(), user_id: u.id, week_key: wk, date, concept, amount, is_income: true,
    worker_name: workerName || null
  });
  if (workerName) {
    const workerUser = allUsers.find(usr => usr.role==='external' && usr.name.toLowerCase()===workerName.toLowerCase());
    if (workerUser) {
      await sb('external_ledger','POST',{ id: genId(), user_id: workerUser.id, date, concept: service, amount, is_income: true });
    }
  }
  document.getElementById('inAmount').value='';
  renderTab('myTransactions');
}

async function addExpense() {
  const u = currentUser;
  const wk = currentWeek;
  const isAdmin = currentUser.role==='admin';
  const dateEl = document.getElementById('expDate');
  const date = (isAdmin && dateEl && dateEl.value) ? dateEl.value : today();
  const concept = document.getElementById('expConcept')?.value.trim()||'';
  const amount = parseFloat(document.getElementById('expAmount')?.value)||0;
  if (!concept||amount<=0) { alert('Ingresa concepto y monto.'); return; }
  const txs = await sb('transactions','GET',null,`?user_id=eq.${u.id}&week_key=eq.${wk}&is_income=eq.false`);
  const spent = txs.reduce((s,t)=>s+parseFloat(t.amount||0),0);
  if (spent+amount>WEEKLY_BUDGET) {
    if (!confirm(`Este gasto supera el presupuesto semanal de Bs ${fmt(WEEKLY_BUDGET)}. ¿Continuar?`)) return;
  }
  await sb('transactions','POST',{ id: genId(), user_id: u.id, week_key: wk, date, concept, amount, is_income: false, worker_name: null });
  document.getElementById('expConcept').value='';
  document.getElementById('expAmount').value='';
  renderTab('myTransactions');
}

function myNav(dir) { currentWeek = dir<0 ? prevWeek(currentWeek) : nextWeek(currentWeek); renderTab('myTransactions'); }
async function addWorkerAdvance() {
  const u      = currentUser;
  const wk     = currentWeek;
  const isAdmin = u.role === 'admin';
  const dateEl  = document.getElementById('advDate');
  const date    = (isAdmin && dateEl && dateEl.value) ? dateEl.value : today();
  const worker  = document.getElementById('advWorker')?.value || '';
  const concept = document.getElementById('advConcept')?.value.trim() || '';
  const amount  = parseFloat(document.getElementById('advAmount')?.value) || 0;

  if (!worker)  { alert('Selecciona una trabajadora.'); return; }
  if (!concept) { alert('Escribe el concepto (adelanto, comida, etc.).'); return; }
  if (amount <= 0) { alert('Ingresa un monto válido.'); return; }

  const fullConcept = 'Adelanto ' + worker + ' - ' + concept;

  // 1. Guardar en transactions para que aparezca en Movimientos del empleado y en admin
  await sb('transactions', 'POST', {
    id: genId(),
    user_id: u.id,
    week_key: wk,
    date,
    concept: fullConcept,
    amount,
    is_income: false,
    worker_name: worker
  });

  // 2. Guardar en external_ledger para descontar del saldo de la chica
  const workerUser = allUsers.find(usr => usr.role === 'external' && usr.name.toLowerCase() === worker.toLowerCase());
  if (workerUser) {
    await sb('external_ledger', 'POST', {
      id: genId(),
      user_id: workerUser.id,
      date,
      concept: concept,
      amount,
      is_income: false
    });
  }

  // Limpiar campos
  document.getElementById('advConcept').value = '';
  document.getElementById('advAmount').value  = '';
  document.getElementById('advWorker').value  = '';

  renderTab('myTransactions');
}

async function renderMyBudget() {
  const u = currentUser;
  const wk = currentWeek;
  const txs = await sb('transactions','GET',null,`?user_id=eq.${u.id}&week_key=eq.${wk}&is_income=eq.false`);
  const spent = txs.reduce((s,t)=>s+parseFloat(t.amount||0),0);

        dayE.forEach(function(e) {

          html += '<td style="font-family:var(--mono);color:var(--success)">' + (e.is_income?'Bs '+fmt(e.amount):'&#x2014;') + '</td>';

          html += '</tr>';

// COTEJO — Comparar empleado vs trabajadora
// ============================================================
async function renderCortejo() {
  const wk = currentWeek;

  // Traer TODOS los transactions (sin filtrar por semana para external_ledger)
  const txs    = await sb('transactions','GET',null,`?week_key=eq.${wk}`);
  const ledger = await sb('external_ledger');
  const externals = allUsers.filter(u=>u.role==='external');

  // --- LO QUE REGISTRARON LOS EMPLEADOS por trabajadora (solo ingresos) ---
  const empByWorker = {};
  WORKER_NAMES.forEach(w => empByWorker[w] = { income:0, entries:[] });
  txs.filter(tx => tx.is_income && tx.worker_name).forEach(tx => {
    const w = tx.worker_name;
    if (!empByWorker[w]) empByWorker[w] = { income:0, entries:[] };
    empByWorker[w].income += parseFloat(tx.amount||0);
    empByWorker[w].entries.push(tx);
  });

  // --- LO QUE REGISTRÓ CADA TRABAJADORA en su propia hoja (solo ingresos) ---
  // Filtrar external_ledger por fechas de la semana actual
  const wkStart = wk;
  const wkEnd   = weekEnd(wk);
  const extByWorker = {};
  externals.forEach(u => {
    const entries = ledger.filter(e =>
      e.user_id === u.id &&
      e.is_income &&
      e.date >= wkStart &&
      e.date <= wkEnd
    );
    extByWorker[u.name] = {
      income: entries.reduce((s,e)=>s+parseFloat(e.amount||0),0),
      entries
    };
  });

  // --- CONSTRUIR FILAS DE COMPARACION ---
  const rows = WORKER_NAMES.map(name => {
    const emp  = empByWorker[name]  || { income:0, entries:[] };
    const ext  = extByWorker[name]  || { income:0, entries:[] };
    const diff = emp.income - ext.income;
    const ok   = Math.abs(diff) < 0.01;
    return { name, emp, ext, diff, ok };
  }).filter(r => r.emp.income > 0 || r.ext.income > 0);

  return `
  <div class="section">
    <div class="sec-header">
      <div class="sec-title">🔍 Cortejo — Empleado vs Trabajadora</div>
      <div class="week-nav">
        <button onclick="cortejoNav(-1)">&#x2039;</button>
        <span class="week-label">${weekLabel(wk)}</span>
        <button onclick="cortejoNav(1)">&#x203a;</button>
      </div>
    </div>

    <div style="background:#7c6af715;border:1px solid #7c6af730;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:13px;line-height:1.7">
      <b>¿Cómo funciona?</b><br>
      • <span style="color:var(--success)">Empleado</span> → lo que pablo1, orosco o juan anotaron como ingreso de cada chica<br>
      • <span style="color:var(--accent2)">Trabajadora</span> → lo que ella misma anotó desde su cuenta<br>
      • Si los montos <b style="color:var(--success)">coinciden ✅</b> todo está bien. Si hay <b style="color:var(--danger)">diferencia ⚠️</b> hay algo que revisar.
    </div>

    ${rows.length === 0
      ? `<div style="color:var(--muted);font-family:var(--mono);padding:40px;text-align:center">Sin ingresos registrados esta semana</div>`
      : rows.map(r => `
    <div class="card" style="margin-bottom:20px;border-left:4px solid ${r.ok?'var(--success)':'var(--danger)'}">

      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <div style="font-size:20px;font-weight:800">${r.name}</div>
        <span style="background:${r.ok?'#6af7b020':'#f76a6a20'};color:${r.ok?'var(--success)':'var(--danger)'};
               border:1px solid ${r.ok?'#6af7b050':'#f76a6a50'};padding:6px 18px;border-radius:20px;
               font-weight:800;font-family:var(--mono);font-size:14px">
          ${r.ok ? '✅ Coincide — Todo cuadra' : '⚠️ Diferencia de Bs ' + fmt(Math.abs(r.diff))}
        </span>
      </div>

      <!-- 3 tarjetas resumen -->
      <div class="grid-3" style="margin-bottom:16px">
        <div class="card" style="border:1px solid rgba(106,247,176,0.3)">
          <div class="card-title">👥 EMPLEADOS REGISTRARON</div>
          <div style="font-family:var(--mono);font-size:26px;font-weight:800;color:var(--success)">Bs ${fmt(r.emp.income)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px">${r.emp.entries.length} registro(s) esta semana</div>
        </div>
        <div class="card" style="border:1px solid rgba(247,196,106,0.3)">
          <div class="card-title">⚡ TRABAJADORA REGISTRÓ</div>
          <div style="font-family:var(--mono);font-size:26px;font-weight:800;color:var(--accent2)">Bs ${fmt(r.ext.income)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px">
            ${r.ext.entries.length > 0 ? r.ext.entries.length + ' registro(s) en su hoja' : 'Sin usuario o sin registros propios'}
          </div>
        </div>
        <div class="card" style="border:1px solid ${r.ok?'rgba(106,247,176,0.4)':'rgba(247,106,106,0.4)'}">
          <div class="card-title">DIFERENCIA</div>
          <div style="font-family:var(--mono);font-size:26px;font-weight:800;color:${r.ok?'var(--success)':'var(--danger)'}">
            ${r.diff >= 0 ? '+' : ''}Bs ${fmt(r.diff)}
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px">
            ${r.ok ? 'Los números cuadran ✅'
              : r.diff > 0 ? '⚠️ Empleado anotó más que la chica'
              : '⚠️ La chica anotó más que el empleado'}
          </div>
        </div>
      </div>

      <!-- Detalle empleado -->
      <details>
        <summary style="cursor:pointer;font-size:13px;color:var(--muted);font-family:var(--mono);padding:8px 0;border-top:1px solid var(--border)">
          ▶ Ver lo que anotaron los empleados (${r.emp.entries.length} registros)
        </summary>
        <div class="table-wrap" style="margin-top:10px">
          <table>
            <tr><th>FECHA</th><th>EMPLEADO</th><th>CONCEPTO</th><th>MONTO</th></tr>
            ${r.emp.entries.length===0
              ? `<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:16px">Sin registros esta semana</td></tr>`
              : [...r.emp.entries].sort((a,b)=>a.date.localeCompare(b.date)).map(tx => {
                  const emp = allUsers.find(u=>u.id===tx.user_id);
                  return `<tr>
                    <td style="font-family:var(--mono);font-size:12px">${fmtDate(tx.date)}</td>
                    <td style="color:var(--accent);font-weight:700">@${emp?emp.username:'?'}</td>
                    <td>${tx.concept||''}</td>
                    <td style="font-family:var(--mono);color:var(--success)">Bs ${fmt(tx.amount)}</td>
                  </tr>`;
                }).join('')}
          </table>
        </div>
      </details>

      <!-- Detalle trabajadora -->
      <details>
        <summary style="cursor:pointer;font-size:13px;color:var(--muted);font-family:var(--mono);padding:8px 0;border-top:1px solid var(--border)">
          ▶ Ver lo que anotó ${r.name} desde su cuenta (${r.ext.entries.length} registros)
        </summary>
        <div class="table-wrap" style="margin-top:10px">
          <table>
            <tr><th>FECHA</th><th>CONCEPTO</th><th>MONTO</th></tr>
            ${r.ext.entries.length===0
              ? `<tr><td colspan="3" style="color:var(--muted);text-align:center;padding:16px">
                  ${externals.find(u=>u.name===r.name)
                    ? 'Sin registros propios esta semana'
                    : r.name + ' no tiene usuario externo creado todavía'}
                </td></tr>`
              : [...r.ext.entries].sort((a,b)=>a.date.localeCompare(b.date)).map(e=>`
                <tr>
                  <td style="font-family:var(--mono);font-size:12px">${fmtDate(e.date)}</td>
                  <td>${e.concept||''}</td>
                  <td style="font-family:var(--mono);color:var(--accent2)">Bs ${fmt(e.amount)}</td>
                </tr>`).join('')}
          </table>
        </div>
      </details>

    </div>`).join('')}
  </div>`;
}

function cortejoNav(dir) {
  currentWeek = dir<0 ? prevWeek(currentWeek) : nextWeek(currentWeek);
  renderTab('cortejo');
}
